include ':app'
include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File('./capacitor-cordova-android-plugins/')

def capacitorSettings = new File(rootDir, 'capacitor.settings.gradle')
if (capacitorSettings.exists()) {
    apply from: capacitorSettings
} else {
    include ':capacitor-android'
    project(':capacitor-android').projectDir = new File(rootDir, '../node_modules/@capacitor/android/capacitor')

    include ':capacitor-app'
    project(':capacitor-app').projectDir = new File(rootDir, '../node_modules/@capacitor/app/android')

    include ':capacitor-haptics'
    project(':capacitor-haptics').projectDir = new File(rootDir, '../node_modules/@capacitor/haptics/android')

    include ':capacitor-splash-screen'
    project(':capacitor-splash-screen').projectDir = new File(rootDir, '../node_modules/@capacitor/splash-screen/android')

    include ':capacitor-status-bar'
    project(':capacitor-status-bar').projectDir = new File(rootDir, '../node_modules/@capacitor/status-bar/android')
}